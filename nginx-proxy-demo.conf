# ================================================================
#  NGINX PROXY DEMO — docker-compose.demo.yml ichidagi proxy
#
#  Bu fayl nginx_proxy_demo konteyneri ichida ishlaydi.
#  Tashqaridan port 7080 ga kelgan so'rovlarni:
#    /api/*      → backend_demo:5000 ga
#    /*          → frontend_demo:80 ga
#  yo'naltiradi.
#
#  Barcha konteynerlar tizim_demo_internal networkida.
#  Tashqariga faqat port 7080 ochiq.
# ================================================================

upstream frontend_upstream {
    server frontend_demo:80;
    keepalive 32;
}

upstream backend_upstream {
    server backend_demo:5000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Demo tizim header — brauzer Network tab'da ko'rinadi
    add_header X-Demo-System "true" always;
    add_header X-Powered-By "IT Live Demo" always;

    # Buffer sozlamalari
    proxy_buffer_size          128k;
    proxy_buffers              4 256k;
    proxy_busy_buffers_size    256k;
    client_max_body_size       50m;

    # ──── API so'rovlar → backend_demo ────
    location /api/ {
        proxy_pass http://backend_upstream/api/;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ──── Socket.IO → backend_demo ────
    location /socket.io/ {
        proxy_pass http://backend_upstream/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location / {
        proxy_pass http://frontend_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
