version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: tizim_db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: normativ_tizim
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5440:5432"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tizim_backend
    environment:
      - DATABASE_URL=postgresql://root:rootpassword@db:5432/normativ_tizim?schema=public
      - PORT=5000
      - JWT_SECRET=super_secret_key_change_this_in_production
      - INITIAL_ADMIN_LOGIN=admin
      - INITIAL_ADMIN_PASSWORD=admin
      - INITIAL_ADMIN_FULLNAME=Administrator
    ports:
      - "5050:5000"
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tizim_frontend
    ports:
      - "8050:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
