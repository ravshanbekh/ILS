# =============================================================
#  SERVER NGINX KONFIGURATSIYASI — itlivescore.uz
#  Fayl: /etc/nginx/sites-available/itlivescore
#
#  O'rnatish:
#    sudo nano /etc/nginx/sites-available/itlivescore
#    (quyidagi konfiguratsiyani joylashtirish)
#    sudo ln -s /etc/nginx/sites-available/itlivescore /etc/nginx/sites-enabled/
#    sudo nginx -t
#    sudo systemctl reload nginx
#
#  SSL (Certbot):
#    sudo certbot --nginx -d itlivescore.uz -d www.itlivescore.uz -d demo.itlivescore.uz
# =============================================================

# ============ ASOSIY TIZIM — itlivescore.uz ============
server {
    listen 80;
    listen [::]:80;
    server_name itlivescore.uz www.itlivescore.uz;

    # HTTP → HTTPS yo'naltirish (certbot qo'shadi)
    # Hozircha HTTP da ishlash uchun quyidagini yoching:

    # Xavfsizlik headerlari
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # HTTPS yoqilgandan keyin (certbot dan so'ng) quyidagini oching:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://localhost:8050;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeout
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Socket.IO uchun maxsus sozlash
    location /socket.io/ {
        proxy_pass http://localhost:8050;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}

# ============ DEMO TIZIM — demo.itlivescore.uz ============
server {
    listen 80;
    listen [::]:80;
    server_name demo.itlivescore.uz;

    # Demo banner — brauzer konsolida ko'rinadi
    add_header X-Demo-Environment "true" always;
    add_header X-Powered-By "IT Live Score Demo" always;

    # Xavfsizlik headerlari
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://localhost:8051;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /socket.io/ {
        proxy_pass http://localhost:8051;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}

